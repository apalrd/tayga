# This is a basic workflow that is manually triggered

name: Run Test Suite

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    inputs:
      ver:
        description: 'Any valid git ref'
        required: false
        type: string

# permissions are set per job
permissions: { }

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ver || github.ref }}
      - name: run build
        run: make
      - name: install deps
        run: sudo apt-get install -y python3-pyroute2 python3-scapy
      - name: install s390x emulation
        if: matrix.arch == 'amd64'
        run: sudo dpkg --add-architecture s390x && sudo apt-get update && \
          sudo apt-get install gcc-s390x-linux-gnu qemu-user-static libc6:s390x
      - name: run test w/o s390x
        if: matrix.arch != 'amd64'
        run: sudo make integration
      - name: run test w/ s390x
        if: matrix.arch == 'amd64'
        run: sudo make integration WITH_BIG_ENDIAN=1
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.arch }}
          path: |
            test/*.rpt
            test/*.log
          if-no-files-found: error
